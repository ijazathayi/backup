<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
    <link rel="stylesheet" href="calculator.css">
</head>
<body>
    <div id='calc-body'>
      <div id="calc-content">
        <input id="inp-screen" value={inputValue} readOnly />
        <div id='but-body'>
          <section>
            <button class='clac-buttons spl-calc-but' onClick={cleardisplay}>C</button>
            <button class='clac-buttons spl-calc-but' onClick={}>DEL</button>
            <button class='clac-buttons spl-calc-but' onClick={}>*</button>
            <button class='clac-buttons spl-calc-but' onClick={}>+</button>
          </section>
          <section>
            <button class='clac-buttons' onClick={}>9</button>
            <button class='clac-buttons' onClick={}>8</button>
            <button class='clac-buttons' onClick={}>7</button>
            <button class='clac-buttons spl-calc-but' onClick={}>-</button>
          </section>
          <section>
            <button class='clac-buttons' onClick={}>6</button>
            <button class='clac-buttons' onClick={}>5</button>
            <button class='clac-buttons' onClick={}>4</button>
            <button class='clac-buttons spl-calc-but' onClick={}>X</button>
          </section>
          <section>
            <button class='clac-buttons' onClick={}>3</button>
            <button class='clac-buttons' onClick={}>2</button>
            <button class='clac-buttons' onClick={}>1</button>
            <button class='clac-buttons spl-calc-but' onClick={calculate}>=</button>
          </section>
        </div>
      </div>
    </div>
    <script>
        function cleardisplay{
            console.log("clear times")
        }
    </script>
</body>
</html>
