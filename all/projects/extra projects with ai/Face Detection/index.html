<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Face Detection</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="app">
    <header>
      <div class="header-icon">📷</div>
      <div class="header-text">
        <h1>Face Detection</h1>
        <p>Real-time face, eye, and smile detection powered by Haar Cascades</p>
      </div>
      <div class="header-badge">
        <span class="live-dot"></span>
        Live Feed
      </div>
    </header>

    <main>
      <!-- Live Webcam Feed (Primary) -->
      <div class="card hero-webcam">
        <div class="card-header">
          <div class="card-icon">📹</div>
          <span class="card-title">Live Camera Feed</span>
          <span class="status-badge" id="webcamStatus">Inactive</span>
        </div>

        <div class="webcam-wrapper">
          <img id="liveResultImg" style="display:none; width: 100%; border-radius: 12px;" alt="Live Video Feed"/>
          
          <div class="webcam-overlay" id="webcamOverlay">
            <div class="overlay-content">
              <span>📷</span>
              <p>Camera is off</p>
            </div>
          </div>
        </div>

        <div class="webcam-controls-bar">
          <button class="primary-btn" id="startWebcamBtn" onclick="startWebcam()">
            <span>▶️</span> Start Camera
          </button>
          <button class="danger-btn" id="stopWebcamBtn" onclick="stopWebcam()" style="display:none;">
            <span>⏹️</span> Stop Camera
          </button>
        </div>
      </div>
    </main>
  </div>

  <div class="toast" id="toast"></div>
  <script src="app.js"></script>
</body>
</html>
